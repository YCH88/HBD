<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heir of the Coven</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    cursor:pointer;
    position:relative;

    background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,.25), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(168,85,247,.15), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(59,130,246,.12), transparent 40%),
        linear-gradient(
            180deg,
            #05030a 0%,
            #120a24 35%,
            #1b1038 70%,
            #09050f 100%
        );

    animation:mysticalSky 12s ease-in-out infinite alternate;
}

@keyframes mysticalSky{
    from{ filter:hue-rotate(0deg); }
    to{ filter:hue-rotate(15deg); }
}

.moon{
    position:absolute;
    top:8%;
    right:10%;
    width:220px;
    height:220px;
    border-radius:50%;

    background:
        radial-gradient(circle at 35% 35%,
        #ffffff,
        #e9d5ff 50%,
        #c084fc 100%);

    box-shadow:
        0 0 50px rgba(192,132,252,.6),
        0 0 120px rgba(192,132,252,.3);

    opacity:.8;
}

.stars{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{ opacity:.2; }
    50%{ opacity:1; }
}

.fog{
    position:absolute;
    width:200%;
    height:250px;
    bottom:0;

    background:
        radial-gradient(
            ellipse at center,
            rgba(255,255,255,.08),
            transparent 70%
        );

    animation:fogMove 25s linear infinite;
}

.fog2{
    animation-duration:40s;
    opacity:.4;
}

@keyframes fogMove{
    from{ transform:translateX(-30%); }
    to{ transform:translateX(0%); }
}

.container{
    text-align:center;
    padding:40px;
    max-width:900px;
    z-index:10;
}

.message{
    color:#f3e8ff;
    font-size:2.2rem;
    line-height:1.5;

    text-shadow:
        0 0 10px rgba(192,132,252,.8),
        0 0 20px rgba(168,85,247,.5),
        0 0 40px rgba(139,92,246,.4);

    transition:opacity .25s;
}

.hint{
    position:absolute;
    bottom:20px;
    color:#d8b4fe;
    font-size:.9rem;
    letter-spacing:2px;
    opacity:.7;
}
</style>
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="fog"></div>
<div class="fog fog2"></div>

<div class="container">
    <div class="message" id="text">
        Tıkla ve kehaneti ortaya çıkar...
    </div>
</div>

<div class="hint">Kehanet, dokunuşlarınla açığa çıkıyor</div>

<script>
const messages = [
    "Bugün çok özel bir gün...",
    "Kadim ilahların işaret ettiği o günün 28. tam dönümü!",
    "Bundan 28 yıl önce dünyaya gelecek olan Heir of the Coven'ın kehaneti duyuruldu.",
    "Gökyüzündeki yıldızlar yer değiştirdi, kuzgunlar sustu ve ay olağandışı bir parlaklıkla yükseldi.",
    "Büyük cadılar meclisi bunu sıradan bir doğum olarak görmedi.",
    "Çünkü kadim büyülerin mirasçısı dünyaya adım atacaktı.",
    "Kara kediler yolları gösterdi, ruhlar fısıltılarla haber taşıdı.",
    "Eski rünlerde tek bir unvan parlıyordu...",
    "'Heir of the Coven.'",
    "Aylar yıllara, yıllar efsanelere dönüştü.",
    "Mevsimler değişti, sayısız dolunay gökyüzünü süsledi.",
    "Fakat kehanetin gücü hiç azalmadı.",
    "Ve bugün...",
    "Kehanetin gerçekleşmesinin 28. yılı kutlanıyor.",
    "Gölgeler sana saygı sunsun.",
    "Yıldızlar yolunu aydınlatsın.",
    "Kazanındaki iksirler hiç eksilmesin.",
    "Büyülerin daima tutsun.",
    "İyi ki doğdun, Heir of the Coven."
];

let index = 0;

document.body.addEventListener("click", () => {

    if(index < messages.length){

        const text = document.getElementById("text");

        text.style.opacity = 0;

        setTimeout(() => {
            text.innerHTML = messages[index];
            text.style.opacity = 1;
            index++;
        }, 250);

    } else {

        window.location.href = "https://matias.me/nsfw/";

    }

});

/* Yıldızlar */
const starsContainer = document.querySelector('.stars');

for(let i = 0; i < 120; i++){
    const star = document.createElement('div');
    star.classList.add('star');

    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 5 + 's';

    starsContainer.appendChild(star);
}
</script>

</body>
</html>
